<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
        <div class="payment-page">
            <div class="payment-top"> 
                <div class="transact">
                     <img class="transact" src="transaction image.jfif" alt="">
                </div>
              
                <h4>ACTIVATE YOUR NEW ACCOUNT</h4>
                <P>Complete M-Pesa verification to access your <span>dollar mine</span> dashboard</P>
            </div>
            <div class="payment-credentials">
                <div class="tel">
                    <p>PHONE NUMBER</p>
                    <input type="text">
                </div>
                <div class="payment-line"></div>
                <div class="fee">
                    <p>ACTIVATION FEE</p>
                    <p class="amount">Ksh 100</p>

                </div>
            </div>
            <button class="pay">PAY WITH M-PESA</button>
        </div>
</body>
</html>
